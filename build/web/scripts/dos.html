<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Registration Example</title>
</head>
<body>

    <h2>User Registration</h2>
    
    <!-- Formulario de registro -->
    <form id="registrationForm" onsubmit="return registerUser()">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required><br><br>
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>
        
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required><br><br>
        
        <input type="submit" value="Register">
    </form>

    <p id="result"></p>

    <script>
        function registerUser() {
            // Obtener los valores de los campos del formulario
            var name = document.getElementById("name").value;
            var email = document.getElementById("email").value;
            var password = document.getElementById("password").value;
            
            // Validación simple (puedes agregar más validaciones según sea necesario)
            if (name == "" || email == "" || password == "") {
                document.getElementById("result").innerHTML = "All fields are required.";
                return false;
            }

            // Mostrar mensaje de registro exitoso
            document.getElementById("result").innerHTML = "Registration successful! Welcome, " + name + ".";
            
            // Detener el envío real del formulario
            return false;
        }
    </script>

</body>
</html>
